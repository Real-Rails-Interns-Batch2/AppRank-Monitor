services:
  - type: web
    name: app-rank-monitor-api  # ഇവിടെ പേര് മാറ്റുക
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"

  - type: web
    name: app-rank-monitor-web  # ഇവിടെയും പേര് മാറ്റുക
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: "20"
